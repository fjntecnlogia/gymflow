name: 🚀 Deploy GYMFLOW

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  # ──────────────────────────────────────────
  # Typecheck — informativo, não bloqueia deploy
  test:
    name: 🧪 Verificar build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Instalar dependências (Web)
        run: cd apps/web && npm install --legacy-peer-deps --no-audit --no-fund
        continue-on-error: true

      - name: Verificar types (Web)
        run: cd apps/web && npx tsc --noEmit
        continue-on-error: true

      - name: Instalar dependências (API)
        run: cd apps/api && npm install --legacy-peer-deps --no-audit --no-fund
        continue-on-error: true

      - name: Verificar types (API)
        run: cd apps/api && npx tsc --noEmit
        continue-on-error: true

  # ──────────────────────────────────────────
  # Deploy independente do test — segue mesmo se typecheck falhar
  deploy-web:
    name: ▲ Deploy Vercel (Web)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Instalar Vercel CLI
        run: npm install -g vercel

      - name: Deploy Web
        # Build feito pelo próprio Vercel (sem --prebuilt) — evita ENOENT do styled-jsx
        # que acontece quando o build local do GH runner usa paths absolutos do Linux.
        run: |
          cd apps/web
          vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ──────────────────────────────────────────
  # Só roda se RAILWAY_TOKEN existir (evita falha quando não configurado)
  deploy-api:
    name: 🚂 Deploy Railway (API)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Verificar se RAILWAY_TOKEN existe
        id: check-token
        run: |
          if [ -z "${{ secrets.RAILWAY_TOKEN }}" ]; then
            echo "RAILWAY_TOKEN não configurado — pulando deploy da API"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Railway CLI
        if: steps.check-token.outputs.skip == 'false'
        run: npm install -g @railway/cli

      - name: Deploy API
        if: steps.check-token.outputs.skip == 'false'
        run: |
          cd apps/api
          railway up --service gymflow-api --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
