[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["cd apps/api && npm install --legacy-peer-deps"]

[phases.build]
cmds = ["cd apps/api && npx prisma@5 generate", "cd apps/api && npm run build"]

[start]
# Não usamos node dist/server.js porque o build (tsc) não está gerando dist/
# de forma confiável (tsc não no PATH + "|| true" mascarando o erro).
# tsx executa TypeScript direto em runtime. prisma db push aplica o schema
# novo (Aluno.senhaHash, tokens) no Postgres antes do servidor subir.
cmd = "cd apps/api && npx prisma@5 db push --accept-data-loss && npx tsx src/server.ts"